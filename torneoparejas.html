<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torneo de los Pibes</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --accent: #3333cc;
      --menu-bg: #f0f0f0;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --text: #ffffff;
      --accent: #3399ff;
      --menu-bg: #1e1e1e;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background-color: var(--bg);
      color: var(--text);
      font-size: 1.1rem;
    }

    main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

    .section { display: none; }
    .active { display: block; }

    input {
      margin: 5px;
      padding: 10px;
      width: 200px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 12px 24px;
      font-size: 1rem;
      background-color: #006400;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .partido {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 15px 0;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .partido input { width: 50px; text-align: center; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th { background: var(--menu-bg); }

    .ronda-box {
      border: 1px solid #ccc;
      padding: 15px;
      margin: 10px;
      border-radius: 8px;
      background: var(--menu-bg);
    }
  </style>
</head>
<body>

<main>
  <section id="jugadores" class="section active">
    <h2>Torneo de los Pibes</h2>
    <p>Ingresá los nombres de los jugadores</p>
    <div id="form-jugadores">
      <input type="text" placeholder="Jugador 1">
      <input type="text" placeholder="Jugador 2">
      <input type="text" placeholder="Jugador 3">
      <input type="text" placeholder="Jugador 4">
    </div>
    <button onclick="agregarInputJugador()">+ Añadir más</button>

    <div id="modo-partido">
      <label><input type="radio" name="modo" value="ida" checked> Solo ida</label>
      <label><input type="radio" name="modo" value="vuelta"> Ida y vuelta</label>
    </div>

    <button onclick="generarTorneo()">Generar Rondas</button>
  </section>

  <section id="rondas" class="section">
    <h2>Rondas de Juego</h2>
    <div id="lista-rondas"></div>
    <button onclick="irAPartidos()">Cargar Resultados</button>
  </section>

  <section id="partidos" class="section">
    <h2>Resultados</h2>
    <div id="partidos-lista"></div>
    <button onclick="calcularYMostrarTabla()">Ver Tabla Final</button>
  </section>

  <section id="tabla" class="section">
    <h2>Tabla de Posiciones</h2>
    <div id="tabla-resultados"></div>
    <button onclick="location.reload()">Nuevo Torneo</button>
  </section>
</main>

<script>

let jugadores = [];
let encuentros = [];

function agregarInputJugador() {

  const input = document.createElement("input");

  input.type = "text";

  input.placeholder =
    `Jugador ${document.querySelectorAll('#form-jugadores input').length + 1}`;

  document.getElementById("form-jugadores")
    .appendChild(input);
}

function mostrarSeccion(id){

  document.querySelectorAll(".section")
    .forEach(sec => sec.classList.remove("active"));

  document.getElementById(id)
    .classList.add("active");
}

function generarTorneo(){

  jugadores = [];
  encuentros = [];

  document.querySelectorAll("#form-jugadores input")
    .forEach(input => {

      const nombre = input.value.trim();

      if(nombre !== ""){
        jugadores.push(nombre);
      }

    });

  if(jugadores.length < 4){

    alert("Se necesitan mínimo 4 jugadores");

    return;
  }

  /* =========================
     GENERAR TODAS LAS PAREJAS
  ========================= */

  let parejas = [];

  for(let i = 0; i < jugadores.length; i++){

    for(let j = i + 1; j < jugadores.length; j++){

      parejas.push([
        jugadores[i],
        jugadores[j]
      ]);

    }

  }

  /* =========================
     CREAR PARTIDOS VÁLIDOS
  ========================= */

  while(parejas.length > 0){

    let pareja1 = parejas.shift();

    let rivalIndex = -1;

    for(let i = 0; i < parejas.length; i++){

      let pareja2 = parejas[i];

      let todos = [
        ...pareja1,
        ...pareja2
      ];

      /* 4 jugadores distintos */

      if(new Set(todos).size === 4){

        rivalIndex = i;

        break;
      }

    }

    /* =========================
       SI ENCUENTRA RIVAL
    ========================= */

    if(rivalIndex !== -1){

      let pareja2 = parejas.splice(rivalIndex,1)[0];

      encuentros.push({

        e1: pareja1,
        e2: pareja2,
        g1: 0,
        g2: 0

      });

    }

    /* =========================
       LIBRE
    ========================= */

    else {

      encuentros.push({

        e1: pareja1,
        e2: null,
        g1: 0,
        g2: 0

      });

    }

  }

  /* =========================
     IDA Y VUELTA
  ========================= */

  const modo =
    document.querySelector('input[name="modo"]:checked').value;

  if(modo === "vuelta"){

    let vuelta = [];

    encuentros.forEach(enc => {

      if(enc.e2){

        vuelta.push({

          e1: enc.e2,
          e2: enc.e1,
          g1: 0,
          g2: 0

        });

      }

    });

    encuentros = encuentros.concat(vuelta);

  }

  mostrarRondas();

  mostrarSeccion("rondas");

}

function mostrarRondas(){

  const lista =
    document.getElementById("lista-rondas");

  lista.innerHTML = "";

  encuentros.forEach((enc,index)=>{

    const div = document.createElement("div");

    div.className = "ronda-box";

    div.innerHTML = `
      <strong>Partido ${index + 1}</strong>
      <br><br>

      ${enc.e1.join(" + ")}

      <br><br>

      VS

      <br><br>

      ${
        enc.e2
        ? enc.e2.join(" + ")
        : "LIBRE"
      }
    `;

    lista.appendChild(div);

  });

}

function irAPartidos(){

  const lista =
    document.getElementById("partidos-lista");

  lista.innerHTML = "";

  encuentros.forEach((enc,index)=>{

    if(!enc.e2) return;

    const div = document.createElement("div");

    div.className = "partido";

    div.innerHTML = `
      <span>${enc.e1.join(" + ")}</span>

      <input
        type="number"
        value="${enc.g1}"
        onchange="actualizarGoles(${index},1,this.value)"
      >

      <span>VS</span>

      <input
        type="number"
        value="${enc.g2}"
        onchange="actualizarGoles(${index},2,this.value)"
      >

      <span>${enc.e2.join(" + ")}</span>
    `;

    lista.appendChild(div);

  });

  mostrarSeccion("partidos");
}

function actualizarGoles(index,equipo,goles){

  goles = parseInt(goles) || 0;

  if(equipo === 1){

    encuentros[index].g1 = goles;

  } else {

    encuentros[index].g2 = goles;
  }
}

function calcularYMostrarTabla(){

  const stats = {};

  jugadores.forEach(j => {

    stats[j] = {
      pts:0,
      pj:0,
      pg:0,
      pe:0,
      pp:0,
      gf:0,
      gc:0
    };

  });

  encuentros.forEach(enc => {

    if(!enc.e2) return;

    enc.e1.forEach(j => {

      stats[j].pj++;
      stats[j].gf += enc.g1;
      stats[j].gc += enc.g2;

    });

    enc.e2.forEach(j => {

      stats[j].pj++;
      stats[j].gf += enc.g2;
      stats[j].gc += enc.g1;

    });

    if(enc.g1 > enc.g2){

      enc.e1.forEach(j => {

        stats[j].pts += 3;
        stats[j].pg++;

      });

      enc.e2.forEach(j => {

        stats[j].pp++;

      });

    }

    else if(enc.g2 > enc.g1){

      enc.e2.forEach(j => {

        stats[j].pts += 3;
        stats[j].pg++;

      });

      enc.e1.forEach(j => {

        stats[j].pp++;

      });

    }

    else {

      enc.e1.forEach(j => {

        stats[j].pts++;
        stats[j].pe++;

      });

      enc.e2.forEach(j => {

        stats[j].pts++;
        stats[j].pe++;

      });

    }

  });

  const ranking =
    Object.entries(stats)
      .sort((a,b)=>{

        const difA = a[1].gf - a[1].gc;
        const difB = b[1].gf - b[1].gc;

        return (
          b[1].pts - a[1].pts ||
          difB - difA
        );

      });

  let html = `
    <table>
      <tr>
        <th>Jugador</th>
        <th>PTS</th>
        <th>PJ</th>
        <th>GF</th>
        <th>GC</th>
        <th>DF</th>
      </tr>
  `;

  ranking.forEach(([nombre,s])=>{

    html += `
      <tr>
        <td>${nombre}</td>
        <td><b>${s.pts}</b></td>
        <td>${s.pj}</td>
        <td>${s.gf}</td>
        <td>${s.gc}</td>
        <td>${s.gf - s.gc}</td>
      </tr>
    `;

  });

  html += `</table>`;

  document.getElementById("tabla-resultados")
    .innerHTML = html;

  mostrarSeccion("tabla");
}

</script>

</body>
</html>

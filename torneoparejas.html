<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torneo de los Pibes</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --accent: #3333cc;
      --menu-bg: #f0f0f0;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --text: #ffffff;
      --accent: #3399ff;
      --menu-bg: #1e1e1e;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background-color: var(--bg);
      color: var(--text);
      font-size: 1.1rem;
    }

    main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

    .section { display: none; }
    .active { display: block; }

    input {
      margin: 5px;
      padding: 10px;
      width: 200px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 12px 24px;
      font-size: 1rem;
      background-color: #006400;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .partido {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 15px 0;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .partido input { width: 50px; text-align: center; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th { background: var(--menu-bg); }

    .ronda-box {
      border: 1px solid #ccc;
      padding: 15px;
      margin: 10px;
      border-radius: 8px;
      background: var(--menu-bg);
    }
  </style>
</head>
<body>

<main>
  <section id="jugadores" class="section active">
    <h2>Torneo de los Pibes</h2>
    <p>Ingresá los nombres de los jugadores</p>
    <div id="form-jugadores">
      <input type="text" placeholder="Jugador 1">
      <input type="text" placeholder="Jugador 2">
      <input type="text" placeholder="Jugador 3">
      <input type="text" placeholder="Jugador 4">
    </div>
    <button onclick="agregarInputJugador()">+ Añadir más</button>

    <div id="modo-partido">
      <label><input type="radio" name="modo" value="ida" checked> Solo ida</label>
      <label><input type="radio" name="modo" value="vuelta"> Ida y vuelta</label>
    </div>

    <button onclick="generarTorneo()">Generar Rondas</button>
  </section>

  <section id="rondas" class="section">
    <h2>Rondas de Juego</h2>
    <div id="lista-rondas"></div>
    <button onclick="irAPartidos()">Cargar Resultados</button>
  </section>

  <section id="partidos" class="section">
    <h2>Resultados</h2>
    <div id="partidos-lista"></div>
    <button onclick="calcularYMostrarTabla()">Ver Tabla Final</button>
  </section>

  <section id="tabla" class="section">
    <h2>Tabla de Posiciones</h2>
    <div id="tabla-resultados"></div>
    <button onclick="location.reload()">Nuevo Torneo</button>
  </section>
</main>

  <script>

let jugadores = [];
let parejasUsadas = [];
let rondas = [];
let rondaActual = 0;

let tabla = {};

/* =========================
   AGREGAR INPUT
========================= */

function agregarInputJugador(){

  const input = document.createElement("input");

  input.type = "text";

  input.placeholder =
    `Jugador ${document.querySelectorAll('#form-jugadores input').length + 1}`;

  document
    .getElementById("form-jugadores")
    .appendChild(input);
}

/* =========================
   MOSTRAR SECCIÓN
========================= */

function mostrarSeccion(id){

  document
    .querySelectorAll(".section")
    .forEach(sec => sec.classList.remove("active"));

  document
    .getElementById(id)
    .classList.add("active");
}

/* =========================
   INICIAR TORNEO
========================= */

function generarTorneo(){

  jugadores = [];
  parejasUsadas = [];
  rondas = [];
  rondaActual = 0;
  tabla = {};

  document
    .querySelectorAll("#form-jugadores input")
    .forEach(input => {

      const nombre = input.value.trim();

      if(nombre !== ""){
        jugadores.push(nombre);

        tabla[nombre] = {
          pts:0,
          pj:0,
          pg:0,
          pe:0,
          pp:0,
          goles:0
        };
      }

    });

  if(jugadores.length < 4){

    alert("Mínimo 4 jugadores");

    return;
  }

  generarRondas();

  mostrarRonda();
}

/* =========================
   GENERAR RONDAS
========================= */

function generarRondas(){

  const todasParejas = [];

  for(let i=0;i<jugadores.length;i++){

    for(let j=i+1;j<jugadores.length;j++){

      todasParejas.push([
        jugadores[i],
        jugadores[j]
      ]);

    }

  }

  while(todasParejas.length > 0){

    const parejasRonda = [];
    const usados = new Set();

    for(let i=0;i<todasParejas.length;i++){

      const pareja = todasParejas[i];

      if(
        usados.has(pareja[0]) ||
        usados.has(pareja[1])
      ){
        continue;
      }

      parejasRonda.push(pareja);

      usados.add(pareja[0]);
      usados.add(pareja[1]);

      todasParejas.splice(i,1);

      i--;
    }

    if(parejasRonda.length >= 2){

      rondas.push(crearPartidos(parejasRonda));

    } else {

      break;
    }

  }
}

/* =========================
   CREAR PARTIDOS
========================= */

function crearPartidos(parejas){

  const partidos = [];

  for(let i=0;i<parejas.length;i++){

    const actual = parejas[i];

    const rival =
      i === parejas.length - 1
      ? parejas[0]
      : parejas[i+1];

    const libre =
      parejas.find(p =>
        p !== actual &&
        p !== rival
      );

    partidos.push({

      local: actual,
      visitante: rival,
      libre: libre || null,
      gl: "",
      gv: ""

    });

  }

  return partidos;
}

/* =========================
   MOSTRAR RONDA
========================= */

function mostrarRonda(){

  mostrarSeccion("rondas");

  const cont =
    document.getElementById("lista-rondas");

  cont.innerHTML = "";

  const ronda = rondas[rondaActual];

  const titulo =
    document.createElement("h3");

  titulo.innerHTML =
    `Ronda ${rondaActual + 1}`;

  cont.appendChild(titulo);

  ronda.forEach((p,index)=>{

    const div =
      document.createElement("div");

    div.className = "ronda-box";

    div.innerHTML = `

      <strong>
      Partido ${index + 1}
      </strong>

      <br><br>

      ${p.local.join(" + ")}

      <br>

      <input
        type="number"
        min="0"
        onchange="guardarGol(${index},'gl',this.value)"
      >

      VS

      <input
        type="number"
        min="0"
        onchange="guardarGol(${index},'gv',this.value)"
      >

      <br>

      ${p.visitante.join(" + ")}

      <br><br>

      ${
        p.libre
        ? `
          <b>Libre:</b>
          ${p.libre.join(" + ")}
        `
        : ""
      }

    `;

    cont.appendChild(div);

  });

  const boton =
    document.createElement("button");

  boton.innerText =
    "Finalizar Ronda";

  boton.onclick =
    finalizarRonda;

  cont.appendChild(boton);
}

/* =========================
   GUARDAR GOLES
========================= */

function guardarGol(index,tipo,valor){

  rondas[rondaActual][index][tipo] =
    parseInt(valor) || 0;
}

/* =========================
   FINALIZAR RONDA
========================= */

function finalizarRonda(){

  const ronda = rondas[rondaActual];

  ronda.forEach(p=>{

    const gl = p.gl;
    const gv = p.gv;

    p.local.forEach(j=>{

      tabla[j].pj++;
      tabla[j].goles += gl;

    });

    p.visitante.forEach(j=>{

      tabla[j].pj++;
      tabla[j].goles += gv;

    });

    if(gl > gv){

      p.local.forEach(j=>{

        tabla[j].pts += 3;
        tabla[j].pg++;

      });

      p.visitante.forEach(j=>{

        tabla[j].pp++;

      });

    }

    else if(gv > gl){

      p.visitante.forEach(j=>{

        tabla[j].pts += 3;
        tabla[j].pg++;

      });

      p.local.forEach(j=>{

        tabla[j].pp++;

      });

    }

    else {

      p.local.forEach(j=>{

        tabla[j].pts++;
        tabla[j].pe++;

      });

      p.visitante.forEach(j=>{

        tabla[j].pts++;
        tabla[j].pe++;

      });

    }

  });

  mostrarTablaParcial();
}

/* =========================
   TABLA
========================= */

function mostrarTablaParcial(){

  mostrarSeccion("tabla");

  const div =
    document.getElementById("tabla-resultados");

  const ranking =
    Object.entries(tabla)
      .sort((a,b)=>
        b[1].pts - a[1].pts
      );

  let html = `

    <h3>
      Tabla parcial
    </h3>

    <table>

      <tr>

        <th>#</th>
        <th>Nombre</th>
        <th>PTS</th>
        <th>PJ</th>
        <th>PG</th>
        <th>PE</th>
        <th>PP</th>
        <th>%PG</th>
        <th>%PE</th>
        <th>%PP</th>
        <th>GOLES</th>

      </tr>

  `;

  ranking.forEach(([nombre,s],i)=>{

    const pg =
      s.pj
      ? ((s.pg/s.pj)*100).toFixed(0)
      : 0;

    const pe =
      s.pj
      ? ((s.pe/s.pj)*100).toFixed(0)
      : 0;

    const pp =
      s.pj
      ? ((s.pp/s.pj)*100).toFixed(0)
      : 0;

    html += `

      <tr>

        <td>${i+1}</td>
        <td>${nombre}</td>
        <td>${s.pts}</td>
        <td>${s.pj}</td>
        <td>${s.pg}</td>
        <td>${s.pe}</td>
        <td>${s.pp}</td>
        <td>${pg}%</td>
        <td>${pe}%</td>
        <td>${pp}%</td>
        <td>${s.goles}</td>

      </tr>

    `;

  });

  html += `</table>`;

  if(rondaActual < rondas.length - 1){

    html += `

      <button onclick="siguienteRonda()">
        Siguiente ronda
      </button>

    `;

  }

  else {

    html += `

      <h2>
        TORNEO FINALIZADO
      </h2>

    `;
  }

  div.innerHTML = html;
}

/* =========================
   SIGUIENTE RONDA
========================= */

function siguienteRonda(){

  rondaActual++;

  mostrarRonda();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torneo de los Pibes</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --accent: #3333cc;
      --menu-bg: #f0f0f0;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --text: #ffffff;
      --accent: #3399ff;
      --menu-bg: #1e1e1e;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background-color: var(--bg);
      color: var(--text);
      font-size: 1.1rem;
    }

    main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

    .section { display: none; }
    .active { display: block; }

    input {
      margin: 5px;
      padding: 10px;
      width: 200px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 12px 24px;
      font-size: 1rem;
      background-color: #006400;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .partido {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 15px 0;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .partido input { width: 50px; text-align: center; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th { background: var(--menu-bg); }

    .ronda-box {
      border: 1px solid #ccc;
      padding: 15px;
      margin: 10px;
      border-radius: 8px;
      background: var(--menu-bg);
    }
  </style>
</head>
<body>

<main>
  <section id="jugadores" class="section active">
    <h2>Torneo de los Pibes</h2>
    <p>Ingresá los nombres de los jugadores</p>
    <div id="form-jugadores">
      <input type="text" placeholder="Jugador 1">
      <input type="text" placeholder="Jugador 2">
      <input type="text" placeholder="Jugador 3">
      <input type="text" placeholder="Jugador 4">
    </div>
    <button onclick="agregarInputJugador()">+ Añadir más</button>

    <div id="modo-partido">
      <label><input type="radio" name="modo" value="ida" checked> Solo ida</label>
      <label><input type="radio" name="modo" value="vuelta"> Ida y vuelta</label>
    </div>

    <button onclick="generarTorneo()">Generar Rondas</button>
  </section>

  <section id="rondas" class="section">
    <h2>Rondas de Juego</h2>
    <div id="lista-rondas"></div>
    <button onclick="irAPartidos()">Cargar Resultados</button>
  </section>

  <section id="partidos" class="section">
    <h2>Resultados</h2>
    <div id="partidos-lista"></div>
    <button onclick="calcularYMostrarTabla()">Ver Tabla Final</button>
  </section>

  <section id="tabla" class="section">
    <h2>Tabla de Posiciones</h2>
    <div id="tabla-resultados"></div>
    <button onclick="location.reload()">Nuevo Torneo</button>
  </section>
</main>

  <script>

let jugadores = [];

let parejasHistoricas = [];

let rondaActualParejas = [];

let partidosRonda = [];

let tablaIndividual = {};

let historialRondas = [];



/* =========================
   AGREGAR INPUT
========================= */

function agregarInputJugador(){

  const input = document.createElement("input");

  input.type = "text";

  input.placeholder =
    `Jugador ${document.querySelectorAll('#form-jugadores input').length + 1}`;

  document.getElementById("form-jugadores")
    .appendChild(input);

}



/* =========================
   MOSTRAR SECCION
========================= */

function mostrarSeccion(id){

  document.querySelectorAll(".section")
    .forEach(sec => sec.classList.remove("active"));

  document.getElementById(id)
    .classList.add("active");

}



/* =========================
   INICIAR TORNEO
========================= */

function generarTorneo(){

  jugadores = [];

  parejasHistoricas = [];

  historialRondas = [];

  tablaIndividual = {};

  document.querySelectorAll("#form-jugadores input")
    .forEach(input => {

      const nombre = input.value.trim();

      if(nombre !== ""){

        jugadores.push(nombre);

      }

    });

  if(jugadores.length < 4){

    alert("Se necesitan mínimo 4 jugadores");

    return;

  }

  jugadores.forEach(j => {

    tablaIndividual[j] = {

      pts:0,
      pj:0,
      pg:0,
      pe:0,
      pp:0

    };

  });

  generarNuevaRonda();

}



/* =========================
   GENERAR NUEVA RONDA
========================= */

function generarNuevaRonda(){

  rondaActualParejas = [];

  partidosRonda = [];

  let disponibles = [...jugadores];



  /* =========================
     GENERAR PAREJAS
  ========================= */

  while(disponibles.length >= 2){

    let jugador1 = disponibles.shift();

    let parejaEncontrada = false;

    for(let i = 0; i < disponibles.length; i++){

      let jugador2 = disponibles[i];

      let nombrePareja =
        [jugador1,jugador2]
        .sort()
        .join("|");

      if(!parejasHistoricas.includes(nombrePareja)){

        rondaActualParejas.push([
          jugador1,
          jugador2
        ]);

        parejasHistoricas.push(nombrePareja);

        disponibles.splice(i,1);

        parejaEncontrada = true;

        break;

      }

    }

    if(!parejaEncontrada){

      break;

    }

  }



  /* =========================
     GENERAR PARTIDOS
  ========================= */

  for(let i = 0; i < rondaActualParejas.length; i++){

    const pareja1 = rondaActualParejas[i];

    const pareja2 =
      rondaActualParejas[
        (i + 1) % rondaActualParejas.length
      ];

    partidosRonda.push({

      e1: pareja1,

      e2: pareja2,

      libre:
        rondaActualParejas[
          (i + 2) % rondaActualParejas.length
        ],

      g1: "",

      g2: ""

    });

  }

  historialRondas.push(partidosRonda);

  mostrarRondas();

}



/* =========================
   MOSTRAR RONDAS
========================= */

function mostrarRondas(){

  const lista =
    document.getElementById("lista-rondas");

  lista.innerHTML = "";

  partidosRonda.forEach((partido,index)=>{

    const div = document.createElement("div");

    div.className = "ronda-box";

    div.innerHTML = `

      <strong>Partido ${index + 1}</strong>

      <br><br>

      ${partido.e1.join(" + ")}

      <br><br>

      VS

      <br><br>

      ${partido.e2.join(" + ")}

      <br><br>

      LIBRE:

      <br><br>

      ${partido.libre.join(" + ")}

    `;

    lista.appendChild(div);

  });

  mostrarSeccion("rondas");

}



/* =========================
   IR A PARTIDOS
========================= */

function irAPartidos(){

  const lista =
    document.getElementById("partidos-lista");

  lista.innerHTML = "";

  partidosRonda.forEach((partido,index)=>{

    const div = document.createElement("div");

    div.className = "partido";

    div.innerHTML = `

      <span>${partido.e1.join(" + ")}</span>

      <input
        type="number"
        min="0"
        onchange="actualizarGoles(${index},1,this.value)"
      >

      <span>VS</span>

      <input
        type="number"
        min="0"
        onchange="actualizarGoles(${index},2,this.value)"
      >

      <span>${partido.e2.join(" + ")}</span>

    `;

    lista.appendChild(div);

  });

  mostrarSeccion("partidos");

}



/* =========================
   ACTUALIZAR GOLES
========================= */

function actualizarGoles(index,equipo,goles){

  goles = parseInt(goles) || 0;

  if(equipo === 1){

    partidosRonda[index].g1 = goles;

  }

  else {

    partidosRonda[index].g2 = goles;

  }

}



/* =========================
   CALCULAR TABLA
========================= */

function calcularYMostrarTabla(){

  partidosRonda.forEach(partido => {

    partido.e1.forEach(j => {

      tablaIndividual[j].pj++;

    });

    partido.e2.forEach(j => {

      tablaIndividual[j].pj++;

    });

    if(partido.g1 > partido.g2){

      partido.e1.forEach(j => {

        tablaIndividual[j].pts += 3;

        tablaIndividual[j].pg++;

      });

      partido.e2.forEach(j => {

        tablaIndividual[j].pp++;

      });

    }

    else if(partido.g2 > partido.g1){

      partido.e2.forEach(j => {

        tablaIndividual[j].pts += 3;

        tablaIndividual[j].pg++;

      });

      partido.e1.forEach(j => {

        tablaIndividual[j].pp++;

      });

    }

    else {

      partido.e1.forEach(j => {

        tablaIndividual[j].pts += 1;

        tablaIndividual[j].pe++;

      });

      partido.e2.forEach(j => {

        tablaIndividual[j].pts += 1;

        tablaIndividual[j].pe++;

      });

    }

  });

  mostrarTabla();

  guardarHistorial();

}



/* =========================
   MOSTRAR TABLA
========================= */

function mostrarTabla(){

  const ranking =
    Object.entries(tablaIndividual)
      .sort((a,b)=>
        b[1].pts - a[1].pts
      );

  let html = `

    <table>

      <tr>

        <th>#</th>
        <th>Nombre</th>
        <th>PTS</th>
        <th>PJ</th>
        <th>PG</th>
        <th>PE</th>
        <th>PP</th>

      </tr>

  `;

  ranking.forEach(([nombre,s],index)=>{

    const porcentajePG =
      s.pj
      ? ((s.pg / s.pj) * 100).toFixed(0)
      : 0;

    const porcentajePE =
      s.pj
      ? ((s.pe / s.pj) * 100).toFixed(0)
      : 0;

    const porcentajePP =
      s.pj
      ? ((s.pp / s.pj) * 100).toFixed(0)
      : 0;

    html += `

      <tr>

        <td>${index + 1}</td>

        <td>${nombre}</td>

        <td>${s.pts}</td>

        <td>${s.pj}</td>

        <td>${s.pg}</td>

        <td>${s.pe}</td>

        <td>${s.pp}</td>

      </tr>

    `;

  });

  html += `</table>`;



  /* =========================
     SIGUIENTE RONDA
  ========================= */

  html += `

    <br><br>

    <button onclick="generarNuevaRonda()">

      Siguiente ronda

    </button>

  `;

  document.getElementById("tabla-resultados")
    .innerHTML = html;

  mostrarSeccion("tabla");

}



/* =========================
   GUARDAR HISTORIAL
========================= */

function guardarHistorial(){

  let historialIndividual =
    JSON.parse(
      localStorage.getItem("historialIndividual")
    ) || [];

  jugadores.forEach(j => {

    let datos = tablaIndividual[j];

    let existente =
      historialIndividual.find(
        h => h.nombre === j
      );

    if(!existente){

      existente = {

        nombre:j,

        pts:0,

        pj:0,

        pg:0,

        pe:0,

        pp:0

      };

      historialIndividual.push(existente);

    }

    existente.pts = datos.pts;

    existente.pj = datos.pj;

    existente.pg = datos.pg;

    existente.pe = datos.pe;

    existente.pp = datos.pp;

  });

  localStorage.setItem(

    "historialIndividual",

    JSON.stringify(historialIndividual)

  );

}

</script>

</body>
</html>

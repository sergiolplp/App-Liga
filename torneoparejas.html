<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torneo de los Pibes</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --accent: #3333cc;
      --menu-bg: #f0f0f0;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --text: #ffffff;
      --accent: #3399ff;
      --menu-bg: #1e1e1e;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background-color: var(--bg);
      color: var(--text);
      font-size: 1.1rem;
    }

    main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

    .section { display: none; }
    .active { display: block; }

    input {
      margin: 5px;
      padding: 10px;
      width: 200px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 12px 24px;
      font-size: 1rem;
      background-color: #006400;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .partido {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 15px 0;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .partido input { width: 50px; text-align: center; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th { background: var(--menu-bg); }

    .ronda-box {
      border: 1px solid #ccc;
      padding: 15px;
      margin: 10px;
      border-radius: 8px;
      background: var(--menu-bg);
    }
  </style>
</head>
<body>

<main>
  <section id="jugadores" class="section active">
    <h2>Torneo de los Pibes</h2>
    <p>Ingresá los nombres de los jugadores</p>
    <div id="form-jugadores">
      <input type="text" placeholder="Jugador 1">
      <input type="text" placeholder="Jugador 2">
      <input type="text" placeholder="Jugador 3">
      <input type="text" placeholder="Jugador 4">
    </div>
    <button onclick="agregarInputJugador()">+ Añadir más</button>

    <div id="modo-partido">
      <label><input type="radio" name="modo" value="ida" checked> Solo ida</label>
      <label><input type="radio" name="modo" value="vuelta"> Ida y vuelta</label>
    </div>

    <button onclick="generarTorneo()">Generar Rondas</button>
  </section>

  <section id="rondas" class="section">
    <h2>Rondas de Juego</h2>
    <div id="lista-rondas"></div>
    <button onclick="irAPartidos()">Cargar Resultados</button>
  </section>

  <section id="partidos" class="section">
    <h2>Resultados</h2>
    <div id="partidos-lista"></div>
    <button onclick="calcularYMostrarTabla()">Ver Tabla Final</button>
  </section>

  <section id="tabla" class="section">
    <h2>Tabla de Posiciones</h2>
    <div id="tabla-resultados"></div>
    <button onclick="location.reload()">Nuevo Torneo</button>
  </section>
</main>

 <script>

let jugadores = [];
let rondas = [];
let rondaActual = 0;

let tablaGeneral = {};

function agregarInputJugador() {

  const input = document.createElement("input");

  input.type = "text";

  input.placeholder =
    `Jugador ${document.querySelectorAll('#form-jugadores input').length + 1}`;

  document.getElementById("form-jugadores")
    .appendChild(input);
}

/* =========================
   MOSTRAR SECCIÓN
========================= */

function mostrarSeccion(id){

  document.querySelectorAll(".section")
    .forEach(sec => sec.classList.remove("active"));

  document.getElementById(id)
    .classList.add("active");
}

/* =========================
   GENERAR TORNEO
========================= */

function generarTorneo(){

  jugadores = [];
  rondas = [];
  rondaActual = 0;

  document.querySelectorAll("#form-jugadores input")
    .forEach(input => {

      const nombre = input.value.trim();

      if(nombre){
        jugadores.push(nombre);
      }

    });

  if(jugadores.length < 4){

    alert("Mínimo 4 jugadores");

    return;
  }

  /* =========================
     CREAR TODAS LAS PAREJAS
  ========================= */

  let parejas = [];

  for(let i=0;i<jugadores.length;i++){

    for(let j=i+1;j<jugadores.length;j++){

      parejas.push([
        jugadores[i],
        jugadores[j]
      ]);

    }

  }

  /* =========================
     ARMAR RONDAS
  ========================= */

  while(parejas.length >= 3){

    const p1 = parejas.shift();

    let rival1 = null;
    let rival2 = null;

    for(let i=0;i<parejas.length;i++){

      const test = parejas[i];

      if(
        !p1.includes(test[0]) &&
        !p1.includes(test[1])
      ){

        rival1 = test;

        parejas.splice(i,1);

        break;
      }

    }

    for(let i=0;i<parejas.length;i++){

      const test = parejas[i];

      const usados = [
        ...p1,
        ...rival1
      ];

      if(
        !usados.includes(test[0]) &&
        !usados.includes(test[1])
      ){

        rival2 = test;

        parejas.splice(i,1);

        break;
      }

    }

    if(rival1 && rival2){

      rondas.push([

        {
          e1:p1,
          e2:rival1,
          g1:"",
          g2:"",
          libre:rival2
        },

        {
          e1:rival1,
          e2:rival2,
          g1:"",
          g2:"",
          libre:p1
        },

        {
          e1:rival2,
          e2:p1,
          g1:"",
          g2:"",
          libre:rival1
        }

      ]);

    }

  }

  /* =========================
     TABLA GENERAL
  ========================= */

  tablaGeneral = {};

  jugadores.forEach(j => {

    tablaGeneral[j] = {

      pts:0,
      pj:0,
      pg:0,
      pe:0,
      pp:0,
      goles:0

    };

  });

  mostrarRonda();
}

/* =========================
   MOSTRAR RONDA
========================= */

function mostrarRonda(){

  mostrarSeccion("rondas");

  const cont =
    document.getElementById("lista-rondas");

  cont.innerHTML = "";

  const ronda = rondas[rondaActual];

  const titulo = document.createElement("h3");

  titulo.innerHTML =
    `RONDA ${rondaActual + 1}`;

  cont.appendChild(titulo);

  ronda.forEach((partido,index)=>{

    const div =
      document.createElement("div");

    div.className = "ronda-box";

    div.innerHTML = `

      <strong>
        ${partido.e1.join(" + ")}
      </strong>

      <br><br>

      <input
        type="number"
        id="g1-${index}"
        value="${partido.g1}"
      >

      VS

      <input
        type="number"
        id="g2-${index}"
        value="${partido.g2}"
      >

      <br><br>

      <strong>
        ${partido.e2.join(" + ")}
      </strong>

      <hr>

      <b>LIBRE:</b>

      <br>

      ${partido.libre.join(" + ")}

    `;

    cont.appendChild(div);

  });

  const btnTabla =
    document.createElement("button");

  btnTabla.innerText =
    "Ver tabla parcial";

  btnTabla.onclick =
    calcularTabla;

  cont.appendChild(btnTabla);

}

/* =========================
   TABLA
========================= */

function calcularTabla(){

  const ronda = rondas[rondaActual];

  ronda.forEach((p,index)=>{

    p.g1 =
      parseInt(
        document.getElementById(`g1-${index}`).value
      ) || 0;

    p.g2 =
      parseInt(
        document.getElementById(`g2-${index}`).value
      ) || 0;

    p.e1.forEach(j=>{

      tablaGeneral[j].pj++;
      tablaGeneral[j].goles += p.g1;

    });

    p.e2.forEach(j=>{

      tablaGeneral[j].pj++;
      tablaGeneral[j].goles += p.g2;

    });

    if(p.g1 > p.g2){

      p.e1.forEach(j=>{

        tablaGeneral[j].pts += 3;
        tablaGeneral[j].pg++;

      });

      p.e2.forEach(j=>{

        tablaGeneral[j].pp++;

      });

    }

    else if(p.g2 > p.g1){

      p.e2.forEach(j=>{

        tablaGeneral[j].pts += 3;
        tablaGeneral[j].pg++;

      });

      p.e1.forEach(j=>{

        tablaGeneral[j].pp++;

      });

    }

    else {

      p.e1.forEach(j=>{

        tablaGeneral[j].pts++;
        tablaGeneral[j].pe++;

      });

      p.e2.forEach(j=>{

        tablaGeneral[j].pts++;
        tablaGeneral[j].pe++;

      });

    }

  });

  mostrarTabla();
}

/* =========================
   MOSTRAR TABLA
========================= */

function mostrarTabla(){

  mostrarSeccion("tabla");

  const div =
    document.getElementById("tabla-resultados");

  let ranking =
    Object.entries(tablaGeneral)
      .sort((a,b)=>
        b[1].pts - a[1].pts
      );

  let html = `

    <table>

      <tr>

        <th>#</th>
        <th>Nombre</th>
        <th>PTS</th>
        <th>PJ</th>
        <th>PG</th>
        <th>PE</th>
        <th>PP</th>
        <th>%PG</th>
        <th>%PE</th>
        <th>%PP</th>
        <th>GOLES</th>

      </tr>

  `;

  ranking.forEach(([nombre,s],i)=>{

    const porcPG =
      s.pj
      ? ((s.pg/s.pj)*100).toFixed(0)
      : 0;

    const porcPE =
      s.pj
      ? ((s.pe/s.pj)*100).toFixed(0)
      : 0;

    const porcPP =
      s.pj
      ? ((s.pp/s.pj)*100).toFixed(0)
      : 0;

    html += `

      <tr>

        <td>${i+1}</td>

        <td>${nombre}</td>

        <td>${s.pts}</td>

        <td>${s.pj}</td>

        <td>${s.pg}</td>

        <td>${s.pe}</td>

        <td>${s.pp}</td>

        <td>${porcPG}%</td>

        <td>${porcPE}%</td>

        <td>${porcPP}%</td>

        <td>${s.goles}</td>

      </tr>

    `;

  });

  html += `</table>`;

  /* =========================
     BOTONES
  ========================= */

  if(rondaActual < rondas.length - 1){

    html += `

      <button onclick="volverARonda()">
        ← Volver
      </button>

      <button onclick="siguienteRonda()">
        Siguiente ronda
      </button>

    `;

  }

  else {

    html += `

      <button onclick="volverARonda()">
        ← Volver
      </button>

      <button onclick="finalizarTorneo()">
        Finalizar torneo
      </button>

      <button onclick="location.reload()">
        Nuevo torneo
      </button>

    `;

  }

  div.innerHTML = html;
}

/* =========================
   SIGUIENTE RONDA
========================= */

function siguienteRonda(){

  rondaActual++;

  mostrarRonda();
}

/* =========================
   VOLVER
========================= */

function volverARonda(){

  mostrarRonda();
}

/* =========================
   FINALIZAR
========================= */

function finalizarTorneo(){

  alert("TORNEO FINALIZADO");

  /*
    ACÁ DESPUÉS
    VAMOS A GUARDAR
    EN historial.html
  */

}

</script>

</body>
</html>

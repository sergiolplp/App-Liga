<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torneo de los Pibes</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --accent: #3333cc;
      --menu-bg: #f0f0f0;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --text: #ffffff;
      --accent: #3399ff;
      --menu-bg: #1e1e1e;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background-color: var(--bg);
      color: var(--text);
      font-size: 1.1rem;
    }

    main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

    .section { display: none; }
    .active { display: block; }

    input {
      margin: 5px;
      padding: 10px;
      width: 200px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 12px 24px;
      font-size: 1rem;
      background-color: #006400;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .partido {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 15px 0;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .partido input { width: 50px; text-align: center; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th { background: var(--menu-bg); }

    .ronda-box {
      border: 1px solid #ccc;
      padding: 15px;
      margin: 10px;
      border-radius: 8px;
      background: var(--menu-bg);
    }
  </style>
</head>
<body>

<main>
  <section id="jugadores" class="section active">
    <h2>Torneo de los Pibes</h2>
    <p>Ingresá los nombres de los jugadores</p>
    <div id="form-jugadores">
      <input type="text" placeholder="Jugador 1">
      <input type="text" placeholder="Jugador 2">
      <input type="text" placeholder="Jugador 3">
      <input type="text" placeholder="Jugador 4">
    </div>
    <button onclick="agregarInputJugador()">+ Añadir más</button>

    <div id="modo-partido">
      <label><input type="radio" name="modo" value="ida" checked> Solo ida</label>
      <label><input type="radio" name="modo" value="vuelta"> Ida y vuelta</label>
    </div>

    <button onclick="generarTorneo()">Generar Rondas</button>
  </section>

  <section id="rondas" class="section">
    <h2>Rondas de Juego</h2>
    <div id="lista-rondas"></div>
    <button onclick="irAPartidos()">Cargar Resultados</button>
  </section>

  <section id="partidos" class="section">
    <h2>Resultados</h2>
    <div id="partidos-lista"></div>
    <button onclick="calcularYMostrarTabla()">Ver Tabla Final</button>
  </section>

  <section id="tabla" class="section">
    <h2>Tabla de Posiciones</h2>
    <div id="tabla-resultados"></div>
    <button onclick="location.reload()">Nuevo Torneo</button>
  </section>
</main>

  <script>

let jugadores = [];
let parejasDisponibles = [];
let parejasUsadas = [];
let rondaActual = [];
let historialRondas = [];

let tablaIndividual = {};
let tablaParejas = [];

/* =========================
   AGREGAR INPUT
========================= */

function agregarInputJugador() {

  const input = document.createElement("input");

  input.type = "text";

  input.placeholder =
    `Jugador ${document.querySelectorAll('#form-jugadores input').length + 1}`;

  document.getElementById("form-jugadores")
    .appendChild(input);
}

/* =========================
   MOSTRAR SECCION
========================= */

function mostrarSeccion(id){

  document.querySelectorAll(".section")
    .forEach(sec => sec.classList.remove("active"));

  document.getElementById(id)
    .classList.add("active");
}

/* =========================
   INICIAR TORNEO
========================= */

function generarTorneo(){

  jugadores = [];
  parejasDisponibles = [];
  parejasUsadas = [];
  historialRondas = [];
  rondaActual = [];
  tablaIndividual = {};
  tablaParejas = [];

  document.querySelectorAll("#form-jugadores input")
    .forEach(input => {

      const nombre = input.value.trim();

      if(nombre !== ""){
        jugadores.push(nombre);
      }

    });

  if(jugadores.length < 4){

    alert("Se necesitan mínimo 4 jugadores");

    return;
  }

  /* =========================
     TABLA INDIVIDUAL
  ========================= */

  jugadores.forEach(j => {

    tablaIndividual[j] = {
      pts:0,
      pj:0,
      pg:0,
      pe:0,
      pp:0
    };

  });

  /* =========================
     GENERAR TODAS LAS PAREJAS
  ========================= */

  for(let i = 0; i < jugadores.length; i++){

    for(let j = i + 1; j < jugadores.length; j++){

      parejasDisponibles.push([
        jugadores[i],
        jugadores[j]
      ]);

    }

  }

  generarNuevaRonda();
}

/* =========================
   GENERAR NUEVA RONDA
========================= */

function generarNuevaRonda(){

  rondaActual = [];

  let usadasEnRonda = [];

  for(let i = 0; i < parejasDisponibles.length; i++){

    const pareja1 = parejasDisponibles[i];

    if(usadasEnRonda.includes(i)) continue;

    let rivalEncontrado = false;

    for(let j = i + 1; j < parejasDisponibles.length; j++){

      if(usadasEnRonda.includes(j)) continue;

      const pareja2 = parejasDisponibles[j];

      const jugadoresPartido = [
        ...pareja1,
        ...pareja2
      ];

      /* =========================
         VALIDAR 4 DISTINTOS
      ========================= */

      if(new Set(jugadoresPartido).size === 4){

        rondaActual.push({

          e1: pareja1,
          e2: pareja2,
          g1: "",
          g2: ""

        });

        usadasEnRonda.push(i);
        usadasEnRonda.push(j);

        rivalEncontrado = true;

        break;
      }

    }

    /* =========================
       LIBRE
    ========================= */

    if(!rivalEncontrado){

      rondaActual.push({

        e1: pareja1,
        e2: null,
        g1: "",
        g2: ""

      });

      usadasEnRonda.push(i);
    }

  }

  /* =========================
     ELIMINAR PAREJAS USADAS
  ========================= */

  usadasEnRonda.sort((a,b)=>b-a);

  usadasEnRonda.forEach(index => {

    parejasUsadas.push(
      parejasDisponibles[index]
    );

    parejasDisponibles.splice(index,1);

  });

  historialRondas.push(rondaActual);

  mostrarRondas();
}

/* =========================
   MOSTRAR RONDAS
========================= */

function mostrarRondas(){

  const lista =
    document.getElementById("lista-rondas");

  lista.innerHTML = "";

  rondaActual.forEach((enc,index)=>{

    const div = document.createElement("div");

    div.className = "ronda-box";

    div.innerHTML = `

      <strong>Partido ${index + 1}</strong>

      <br><br>

      ${enc.e1.join(" + ")}

      <br><br>

      VS

      <br><br>

      ${
        enc.e2
        ? enc.e2.join(" + ")
        : "LIBRE"
      }

    `;

    lista.appendChild(div);

  });

  mostrarSeccion("rondas");
}

/* =========================
   IR A RESULTADOS
========================= */

function irAPartidos(){

  const lista =
    document.getElementById("partidos-lista");

  lista.innerHTML = "";

  rondaActual.forEach((enc,index)=>{

    if(!enc.e2) return;

    const div = document.createElement("div");

    div.className = "partido";

    div.innerHTML = `

      <span>${enc.e1.join(" + ")}</span>

      <input
        type="number"
        min="0"
        onchange="actualizarGoles(${index},1,this.value)"
      >

      <span>VS</span>

      <input
        type="number"
        min="0"
        onchange="actualizarGoles(${index},2,this.value)"
      >

      <span>${enc.e2.join(" + ")}</span>

    `;

    lista.appendChild(div);

  });

  mostrarSeccion("partidos");
}

/* =========================
   ACTUALIZAR GOLES
========================= */

function actualizarGoles(index,equipo,goles){

  goles = parseInt(goles) || 0;

  if(equipo === 1){

    rondaActual[index].g1 = goles;

  } else {

    rondaActual[index].g2 = goles;
  }
}

/* =========================
   CERRAR RONDA
========================= */

function calcularYMostrarTabla(){

  rondaActual.forEach(enc => {

    if(!enc.e2) return;

    const parejaNombre1 =
      enc.e1.join(" + ");

    const parejaNombre2 =
      enc.e2.join(" + ");

    /* =========================
       TABLA PAREJAS
    ========================= */

    actualizarPareja(
      parejaNombre1,
      enc.g1,
      enc.g2
    );

    actualizarPareja(
      parejaNombre2,
      enc.g2,
      enc.g1
    );

    /* =========================
       PJ
    ========================= */

    enc.e1.forEach(j => {
      tablaIndividual[j].pj++;
    });

    enc.e2.forEach(j => {
      tablaIndividual[j].pj++;
    });

    /* =========================
       GANADOR
    ========================= */

    if(enc.g1 > enc.g2){

      enc.e1.forEach(j => {

        tablaIndividual[j].pts += 3;
        tablaIndividual[j].pg++;

      });

      enc.e2.forEach(j => {

        tablaIndividual[j].pp++;

      });

    }

    else if(enc.g2 > enc.g1){

      enc.e2.forEach(j => {

        tablaIndividual[j].pts += 3;
        tablaIndividual[j].pg++;

      });

      enc.e1.forEach(j => {

        tablaIndividual[j].pp++;

      });

    }

    else {

      enc.e1.forEach(j => {

        tablaIndividual[j].pts += 1;
        tablaIndividual[j].pe++;

      });

      enc.e2.forEach(j => {

        tablaIndividual[j].pts += 1;
        tablaIndividual[j].pe++;

      });

    }

  });

  mostrarTabla();

  guardarHistorial();

}

/* =========================
   ACTUALIZAR PAREJAS
========================= */

function actualizarPareja(nombre,gf,gc){

  let pareja = tablaParejas.find(
    p => p.nombre === nombre
  );

  if(!pareja){

    pareja = {
      nombre,
      pts:0,
      pj:0,
      pg:0,
      pe:0,
      pp:0
    };

    tablaParejas.push(pareja);
  }

  pareja.pj++;

  if(gf > gc){

    pareja.pts += 3;
    pareja.pg++;

  }

  else if(gf < gc){

    pareja.pp++;

  }

  else {

    pareja.pts += 1;
    pareja.pe++;

  }
}

/* =========================
   MOSTRAR TABLA
========================= */

function mostrarTabla(){

  const ranking =
    Object.entries(tablaIndividual)
      .sort((a,b)=>
        b[1].pts - a[1].pts
      );

  let html = `

    <table>

      <tr>

        <th>#</th>
        <th>Jugador</th>
        <th>PTS</th>
        <th>PJ</th>
        <th>PG</th>
        <th>PE</th>
        <th>PP</th>

      </tr>

  `;

  ranking.forEach(([nombre,s],index)=>{

    html += `

      <tr>

        <td>${index + 1}</td>

        <td>${nombre}</td>

        <td>${s.pts}</td>

        <td>${s.pj}</td>

        <td>${s.pg}</td>

        <td>${s.pe}</td>

        <td>${s.pp}</td>

      </tr>

    `;

  });

  html += `</table>`;

  /* =========================
     BOTON SIGUIENTE RONDA
  ========================= */

  if(parejasDisponibles.length > 0){

    html += `

      <br><br>

      <button onclick="generarNuevaRonda()">

        Siguiente Ronda

      </button>

    `;

  }

  else {

    html += `

      <br><br>

      <h2>TORNEO FINALIZADO</h2>

    `;
  }

  document.getElementById("tabla-resultados")
    .innerHTML = html;

  mostrarSeccion("tabla");
}

/* =========================
   GUARDAR HISTORIAL
========================= */

function guardarHistorial(){

  /* =========================
     HISTORIAL INDIVIDUAL
  ========================= */

  let historialIndividual =
    JSON.parse(
      localStorage.getItem("historialIndividual")
    ) || [];

  jugadores.forEach(j => {

    const datos = tablaIndividual[j];

    let jugadorHistorial =
      historialIndividual.find(
        h => h.nombre === j
      );

    if(!jugadorHistorial){

      jugadorHistorial = {
        nombre:j,
        pts:0,
        pj:0,
        pg:0,
        pe:0,
        pp:0
      };

      historialIndividual.push(jugadorHistorial);
    }

    jugadorHistorial.pts += datos.pts;
    jugadorHistorial.pj += datos.pj;
    jugadorHistorial.pg += datos.pg;
    jugadorHistorial.pe += datos.pe;
    jugadorHistorial.pp += datos.pp;

  });

  localStorage.setItem(
    "historialIndividual",
    JSON.stringify(historialIndividual)
  );

  /* =========================
     HISTORIAL PAREJAS
  ========================= */

  let historialParejas =
    JSON.parse(
      localStorage.getItem("historialParejas")
    ) || [];

  tablaParejas.forEach(p => {

    let parejaHistorial =
      historialParejas.find(
        h => h.nombre === p.nombre
      );

    if(!parejaHistorial){

      parejaHistorial = {
        nombre:p.nombre,
        pts:0,
        pj:0,
        pg:0,
        pe:0,
        pp:0
      };

      historialParejas.push(parejaHistorial);
    }

    parejaHistorial.pts += p.pts;
    parejaHistorial.pj += p.pj;
    parejaHistorial.pg += p.pg;
    parejaHistorial.pe += p.pe;
    parejaHistorial.pp += p.pp;

  });

  localStorage.setItem(
    "historialParejas",
    JSON.stringify(historialParejas)
  );
}

</script>

</body>
</html>
